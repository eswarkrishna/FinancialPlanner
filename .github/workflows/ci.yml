name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build app
        run: npm run build

      - name: Run browser automation (E2E)
        run: npm run test:e2e
      - name: Sync Android Capacitor bundle (§5.2)
        run: npm run cap:sync

      - name: Verify Android sync artifacts (§10.40)
        run: npm run verify:android

      - name: Verify SEO build artifacts (§10.54–55)
        run: npx tsx scripts/verify-seo-signoff.ts

  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Android Capacitor bundle (§5.2)
        run: npm run cap:sync

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Java 21 (Capacitor 8 requires JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Assemble debug APK (§10.41)
        run: npm run android:assemble
