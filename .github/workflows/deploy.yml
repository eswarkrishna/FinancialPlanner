# Deploy (S3 + CloudFront)

Paused while the public demo is offline. Re-enable by restoring the previous
job steps from git history when bringing production back up.

name: Deploy

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  paused:
    runs-on: ubuntu-latest
    steps:
      - name: Production deploy paused
        run: |
          echo "S3/CloudFront deploy is paused (site taken down)."
          echo "GitHub Pages serves offline-site/ instead of the SPA."
          exit 0
