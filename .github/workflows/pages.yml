# Public demo: https://eswarkrishna.github.io/FinancialPlanner/
name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install, test, build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: |
          npm ci
          npm run lint
          npm run test
          # Only export when set; an empty env var would override .env.production.
          if [ -n "${{ secrets.VITE_GA_MEASUREMENT_ID }}" ]; then
            export VITE_GA_MEASUREMENT_ID="${{ secrets.VITE_GA_MEASUREMENT_ID }}"
          fi
          npm run build

      - name: Verify SEO build artifacts (§10.54–55)
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npx tsx scripts/verify-seo-signoff.ts

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
