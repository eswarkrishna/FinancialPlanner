<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Encrypted brainstorm — enter key</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f1419;
        --panel: #1a2332;
        --text: #e7ecf3;
        --muted: #9aa7b8;
        --accent: #3b82f6;
        --danger: #ef4444;
        --ok: #22c55e;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 1.5rem;
      }
      .card {
        width: min(720px, 100%);
        background: var(--panel);
        border: 1px solid #2a3648;
        border-radius: 12px;
        padding: 1.5rem;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      }
      h1 { margin: 0 0 0.5rem; font-size: 1.25rem; }
      p { color: var(--muted); line-height: 1.5; }
      label { display: block; margin: 1rem 0 0.35rem; font-size: 0.9rem; }
      input[type="password"] {
        width: 100%;
        padding: 0.75rem 0.9rem;
        border-radius: 8px;
        border: 1px solid #334155;
        background: #0b1220;
        color: var(--text);
        font-size: 1rem;
      }
      button {
        margin-top: 1rem;
        width: 100%;
        padding: 0.8rem;
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: white;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      .error { color: var(--danger); margin-top: 0.75rem; min-height: 1.25rem; }
      .ok { color: var(--ok); margin-top: 0.75rem; }
      #content {
        display: none;
        margin-top: 1.25rem;
        padding-top: 1.25rem;
        border-top: 1px solid #2a3648;
        max-height: 70vh;
        overflow: auto;
        line-height: 1.6;
      }
      #content h1, #content h2, #content h3 { margin-top: 1.25rem; }
      #content table { border-collapse: collapse; width: 100%; font-size: 0.92rem; }
      #content th, #content td { border: 1px solid #334155; padding: 0.45rem 0.6rem; text-align: left; }
      #content code { background: #0b1220; padding: 0.1rem 0.35rem; border-radius: 4px; }
      #content pre { background: #0b1220; padding: 1rem; overflow: auto; border-radius: 8px; }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <div class="card">
      <div id="unlock">
        <h1>Client growth & productivity brainstorm</h1>
        <p>This document is encrypted at rest. Enter your passphrase to decrypt locally in the browser. Your key is never sent to a server.</p>
        <label for="key">Decryption key</label>
        <input id="key" type="password" autocomplete="current-password" placeholder="Enter your passphrase" />
        <button id="decryptBtn" type="button">Decrypt &amp; view</button>
        <div id="status" class="error" role="alert"></div>
      </div>
      <article id="content"></article>
    </div>

      async function deriveKey(password, salt) {
        const enc = new TextEncoder();
        const baseKey = await crypto.subtle.importKey(
          'raw',
          enc.encode(password),
          'PBKDF2',
          false,
          ['deriveBits']
        );
        const bits = await crypto.subtle.deriveBits(
          { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
          baseKey,
          256
        );
        return crypto.subtle.importKey('raw', bits, 'AES-GCM', false, ['decrypt']);
      }

      function mdToHtml(md) {
        return md
          .replace(/^### (.*)$/gm, '<h3>$1</h3>')
          .replace(/^## (.*)$/gm, '<h2>$1</h2>')
          .replace(/^# (.*)$/gm, '<h1>$1</h1>')
          .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
          .replace(/`([^`]+)`/g, '<code>$1</code>')
          .replace(/^> (.*)$/gm, '<blockquote>$1</blockquote>')
          .replace(/^- (.*)$/gm, '<li>$1</li>')
          .replace(/(<li>.*<\/li>\n?)+/g, (m) => `<ul>${m}</ul>`)
          .replace(/\n\n/g, '</p><p>')
          .replace(/^(?!<[hubl]|<blockquote)(.+)$/gm, '<p>$1</p>');
      }

      async function decryptPayload(password) {
        const raw = document.getElementById('encrypted-payload').textContent.trim();
        if (raw.includes('PLACEHOLDER_LOAD_ENC_JSON')) {
          throw new Error('Encrypted payload not embedded yet. Run: node scripts/encrypt-brainstorm.mjs encrypt');
        }
        const payload = JSON.parse(raw);

        const salt = Uint8Array.from(atob(payload.salt), (c) => c.charCodeAt(0));
        const iv = Uint8Array.from(atob(payload.iv), (c) => c.charCodeAt(0));
        const tag = Uint8Array.from(atob(payload.tag), (c) => c.charCodeAt(0));
        const data = Uint8Array.from(atob(payload.ciphertext), (c) => c.charCodeAt(0));
        const cipherWithTag = new Uint8Array(data.length + tag.length);
        cipherWithTag.set(data);
        cipherWithTag.set(tag, data.length);

        const key = await deriveKey(password, salt);
        const plainBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, cipherWithTag);
        return new TextDecoder().decode(plainBuf);
      }

      const keyInput = document.getElementById('key');
      const btn = document.getElementById('decryptBtn');
      const status = document.getElementById('status');
      const content = document.getElementById('content');
      const unlock = document.getElementById('unlock');

      async function runDecrypt() {
        status.textContent = '';
        status.className = 'error';
        btn.disabled = true;
        try {
          const markdown = await decryptPayload(keyInput.value);
          content.innerHTML = mdToHtml(markdown);
          content.style.display = 'block';
          unlock.classList.add('hidden');
          status.className = 'ok';
          status.textContent = 'Decrypted successfully. Content shown below.';
        } catch (err) {
          status.textContent = err.message || 'Wrong key or corrupted file.';
        } finally {
          btn.disabled = false;
        }
      }

      btn.addEventListener('click', runDecrypt);
      keyInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') runDecrypt();
      });
    </script>
  </body>
</html>
