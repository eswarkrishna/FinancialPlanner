<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>FinancialPlanner — offline</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #0f172a;
        --fg: #e2e8f0;
        --muted: #94a3b8;
        --accent: #38bdf8;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        font-family: "Segoe UI", system-ui, sans-serif;
        background:
          radial-gradient(ellipse at top, #1e293b 0%, var(--bg) 55%),
          var(--bg);
        color: var(--fg);
      }
      main {
        max-width: 32rem;
        text-align: center;
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(1.75rem, 4vw, 2.25rem);
        letter-spacing: -0.02em;
      }
      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }
      .mark {
        display: inline-block;
        margin-bottom: 1.25rem;
        color: var(--accent);
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">FinancialPlanner</div>
      <h1>This site is offline</h1>
      <p>
        The public demo has been taken down. Source code remains on GitHub; the
        hosted calculator is no longer available.
      </p>
    </main>
  </body>
</html>
